# Lancer Campaign — Relationship Clocks
# Proxies lancer.loquacity.org → Node.js server on localhost:3001

server {
    listen 80;
    server_name lancer.loquacity.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lancer.loquacity.org;

    ssl_certificate     /etc/letsencrypt/live/lancer.loquacity.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lancer.loquacity.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';   # required for SSE keep-alive
        proxy_buffering    off;                    # SSE must not be buffered
        proxy_cache        off;
        proxy_read_timeout 86400s;                 # keep SSE connections open for up to 24h
    }
}
